name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (saves CI minutes on rapid pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint + test + build, scoped to affected projects for speed.
  # ---------------------------------------------------------------------------
  main:
    name: Lint / Test / Build (affected)
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 gives `nx affected` the full history it needs to diff
      # against the base branch (PR target) or last successful commit (push).
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Derives the correct base/head SHAs for `nx affected` and, on PRs,
      # fetches the base branch so the diff resolves.
      - name: Derive affected SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Lint, test & build affected projects
        run: npx nx affected -t lint test build

